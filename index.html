<script>
const WEDGE_CLUBS=["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW"]
const WEDGE_DISTANCES=[10,15,20,25,30,35,40,45,50,55,60,65,70,75,80]
const RANGE_CLUBS=["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW","9i","8i","7i","6i","5i","4i","3i","4h","5h","4w","Driver"]
const RANGE_MANUAL_CLUBS=["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW","9i","8i","7i","6i","5i","4i","3i","5h","4h","4w","Driver"]
const RANGE_DISTANCES=Array.from({length:176},(_,i)=>85+i)
const RANGE_DISTANCE_MIN=RANGE_DISTANCES[0]
const RANGE_DISTANCE_MAX=RANGE_DISTANCES[RANGE_DISTANCES.length-1]
const RANGE_CARRY_YARDAGES={
 "62 deg":80,
 "60 deg":85,
 "58 deg":95,
 "56 deg":100,
 "54 deg":105,
 "52 deg":110,
 "UW":115,
 "48 deg":120,
 "PW":130,
 "9i":140,
 "8i":150,
 "7i":160,
 "6i":170,
 "5i":180,
 "4i":190,
 "3i":200,
 "5h":205,
 "4h":215,
 "3h":225,
 "4w":235,
 "Driver":250
}
const RANGE_RECOMMENDATION_WINDOW=5
const ALL_CLUBS=["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW","9i","8i","7i","6i","5i","4i","3i","3h","4h","5h","4w","5w","3w","Driver"]
const RANGE_WIND_ADJUSTMENTS={
 wedge:{head:0.02,tail:0.01},
 iron:{head:0.025,tail:0.015},
 woodHybrid:{head:0.03,tail:0.025}
}
const RANGE_DEFAULT_TEMP=70
const RANGE_TEMP_MIN=50
const RANGE_TEMP_MAX=100
const RANGE_TEMP_STEP=5
const RANGE_TEMP_ADJUSTMENTS={
 wedge:0.007,
 iron:0.01,
 woodHybrid:0.013
}
const ALL_DISTANCES=Array.from({length:RANGE_DISTANCE_MAX-WEDGE_DISTANCES[0]+1},(_,i)=>WEDGE_DISTANCES[0]+i)
const MODE_CONFIG={
 wedge:{clubs:WEDGE_CLUBS,distances:WEDGE_DISTANCES,defaultClub:"56 deg",defaultDistance:25},
 range:{clubs:RANGE_CLUBS,distances:RANGE_DISTANCES,defaultClub:"9i",defaultDistance:135}
}
const PGA_PROXIMITY={10:6,15:8,20:10,25:12,30:15,35:18,40:21,45:24,50:27,55:30,60:33,65:36,70:39,75:42,80:45}
const UP_AND_DOWN={10:67,15:60,20:53,25:46,30:40,35:35,40:30,45:27,50:25,55:23,60:20,65:18,70:16,75:14,80:12}
const DEFAULT_TARGET_SET_MODE="wedge"
const TARGET_SET_MODES=["wedge","range"]
const DEFAULT_CLUB=MODE_CONFIG.wedge.defaultClub
const PRACTICE_MODE_KEY="shootingPracticeMode"
const TARGET_SET_MODE_KEY="shootingTargetSetMode"
const RANGE_WIND_SPEED_KEY="shootingRangeWindSpeed"
const RANGE_TEMP_KEY="shootingRangeTemp"
const SHOT_HISTORY_KEY="shootingShotHistory"
const SELECTION_STATE_KEY="shootingSelectionState"

let currentClub=DEFAULT_CLUB
let currentDistance=MODE_CONFIG.wedge.defaultDistance
let stats
let streaks
let bestStreaks
let sessions
let shotHistory=[]
let practiceMode="manual"
let targetSetMode=DEFAULT_TARGET_SET_MODE
let rangeWindDirection="head"
let rangeWindSpeed=0
let rangeTemperature=RANGE_DEFAULT_TEMP
let modeSelections={
 wedge:{club:MODE_CONFIG.wedge.defaultClub,distance:MODE_CONFIG.wedge.defaultDistance}
}
let rangeSelections={
 random:{club:MODE_CONFIG.range.defaultClub,distance:MODE_CONFIG.range.defaultDistance},
 manual:{club:MODE_CONFIG.range.defaultClub,distance:MODE_CONFIG.range.defaultDistance}
}

const $=(id)=>{
 const el=document.getElementById(id)
 if(!el) throw new Error("Missing DOM element: "+id)
 return el
}

function getModeConfig(mode=targetSetMode){return MODE_CONFIG[mode]}
function getSelectableClubs(mode=targetSetMode){return getModeConfig(mode).clubs}
function getSelectableDistances(mode=targetSetMode){return getModeConfig(mode).distances}
function isRangeMode(mode=targetSetMode){return mode==="range"}
function getActivePracticeMode(){return practiceMode}
function getShotTargetMode(shot){return shot.targetSetMode||"wedge"}
function inferLegacyTargetSetMode(club,distance){
 return distance>=RANGE_DISTANCES[0] ? "range" : "wedge"
}
function getModeShotHistory(mode,targetMode=targetSetMode){
 return shotHistory.filter(shot=>(shot.mode||"manual")===mode && getShotTargetMode(shot)===targetMode)
}
function getTargetFeet(distance,mode){
 return mode==="wedge" ? (PGA_PROXIMITY[distance] ?? "") : ""
}
function getUpAndDownValue(distance,mode){
 return mode==="wedge" ? UP_AND_DOWN[distance] : null
}
function getSignedWindSpeed(){
 return rangeWindSpeed
}
function formatWindSpeed(){
 const signed=getSignedWindSpeed()
 if(signed>0) return "+"+signed+" mph"
 if(signed<0) return signed+" mph"
 return "0 mph"
}
function formatSignedWindLabel(signed){
 if(signed>0) return "Head Wind +"+signed+" mph"
 if(signed<0) return "Tail Wind "+signed+" mph"
 return "0 mph"
}
function formatRangeTemperature(){
 return rangeTemperature+String.fromCharCode(176)+"F"
}
function getShotWindLabel(shot){
 if(shot && shot.windDirection){
  const direction=shot.windDirection
  const speed=Math.abs(Number(shot.windSpeed)||0)
  const signed=direction==="head" ? speed : -speed
  return formatSignedWindLabel(signed)
 }
 return formatSignedWindLabel(Number(shot && shot.windSpeed) || 0)
}
function getShotTempLabel(shot){
 const temperature=Number(shot && shot.temperature)
 if(!Number.isFinite(temperature) || temperature<=0) return ""
 return temperature+String.fromCharCode(176)+"F"
}
function uniqueValues(values){
 return Array.from(new Set(values.filter(Boolean)))
}
function getRangeWindSummary(shots,club,distance){
 if(!Array.isArray(shots)) return ""
 const labels=uniqueValues(shots
  .filter(shot=>getShotTargetMode(shot)==="range" && shot.club===club && shot.distance===distance)
  .map(getShotWindLabel))
 return labels.join(" | ")
}
function getRangeWindSummaryForClub(shots,club){
 if(!Array.isArray(shots)) return ""
 const labels=uniqueValues(shots
  .filter(shot=>getShotTargetMode(shot)==="range" && shot.club===club)
  .map(getShotWindLabel))
 return labels.join(" | ")
}
function getRangeWindSummaryForSession(shots){
 if(!Array.isArray(shots)) return ""
 const labels=uniqueValues(shots
  .filter(shot=>getShotTargetMode(shot)==="range")
  .map(getShotWindLabel))
 return labels.join(" | ")
}
function getRangeTempSummary(shots,club,distance){
 if(!Array.isArray(shots)) return ""
 const labels=uniqueValues(shots
  .filter(shot=>getShotTargetMode(shot)==="range" && shot.club===club && shot.distance===distance)
  .map(getShotTempLabel))
 return labels.join(" | ")
}
function getRangeTempSummaryForClub(shots,club){
 if(!Array.isArray(shots)) return ""
 const labels=uniqueValues(shots
  .filter(shot=>getShotTargetMode(shot)==="range" && shot.club===club)
  .map(getShotTempLabel))
 return labels.join(" | ")
}
function getRangeTempSummaryForSession(shots){
 if(!Array.isArray(shots)) return ""
 const labels=uniqueValues(shots
  .filter(shot=>getShotTargetMode(shot)==="range")
  .map(getShotTempLabel))
 return labels.join(" | ")
}
function getModeLabel(hasRange,hasWedge){
 if(hasRange && hasWedge) return "Mixed"
 if(hasRange) return "Range"
 return "Wedge"
}
function hasRangeLabel(label){return label==="Range" || label==="Mixed"}
function hasWedgeLabel(label){return label==="Wedge" || label==="Mixed"}
function getRangeClubCategory(club){
 if(["62 deg","60 deg","58 deg","56 deg","54 deg","52 deg","UW","48 deg","PW"].includes(club)) return "wedge"
 if(["9i","8i","7i","6i","5i","4i","3i"].includes(club)) return "iron"
 return "woodHybrid"
}
function getAdjustedRangeCarry(club){
 const baseCarry=RANGE_CARRY_YARDAGES[club]||0
 if(!baseCarry) return baseCarry

 const category=getRangeClubCategory(club)
 let adjustedCarry=baseCarry

 if(rangeWindSpeed){
  const steps=Math.abs(rangeWindSpeed)/5
  const windRates=RANGE_WIND_ADJUSTMENTS[category]
  if(windRates){
   if(rangeWindSpeed>0){
    adjustedCarry=Math.max(0,adjustedCarry*(1-windRates.head*steps))
   }else if(rangeWindSpeed<0){
    adjustedCarry=adjustedCarry*(1+windRates.tail*steps)
   }
  }
 }

 if(rangeTemperature!==RANGE_DEFAULT_TEMP){
  const tempSteps=(rangeTemperature-RANGE_DEFAULT_TEMP)/RANGE_TEMP_STEP
  const tempRate=RANGE_TEMP_ADJUSTMENTS[category]||0
  adjustedCarry=adjustedCarry*(1+tempRate*tempSteps)
 }

 return Math.max(0,adjustedCarry)
}
function clampRangeDistance(distance){
 return Math.max(RANGE_DISTANCE_MIN,Math.min(RANGE_DISTANCE_MAX,Math.round(distance)))
}
function getManualRangeTargetDistance(club=currentClub){
 const adjustedCarry=getAdjustedRangeCarry(club)
 const fallbackCarry=RANGE_CARRY_YARDAGES[club]||MODE_CONFIG.range.defaultDistance
 return Math.round(adjustedCarry||fallbackCarry)
}
function bucketHasShots(statsMap,targetMode,club,distances){
 return distances.some(d=>{
  const bucket=statsMap && statsMap[targetMode] && statsMap[targetMode][club] && statsMap[targetMode][club][d]
  return !!bucket && ((bucket.made||0)+(bucket.missed||0)>0)
 })
}
function getClubRangeModeLabel(statsMap,club){
 return getModeLabel(
  bucketHasShots(statsMap,"range",club,ALL_DISTANCES),
  bucketHasShots(statsMap,"wedge",club,ALL_DISTANCES)
 )
}
function getSessionRangeModeLabel(statsMap){
 const hasRange=ALL_CLUBS.some(club=>bucketHasShots(statsMap,"range",club,ALL_DISTANCES))
 const hasWedge=ALL_CLUBS.some(club=>bucketHasShots(statsMap,"wedge",club,ALL_DISTANCES))
 return getModeLabel(hasRange,hasWedge)
}
function getRangeEligibleClubs(distance=currentDistance){
 return RANGE_CLUBS.filter(club=>Math.abs(getAdjustedRangeCarry(club)-distance)<=RANGE_RECOMMENDATION_WINDOW)
}
function getRecommendedRangeClub(distance=currentDistance){
 const eligible=getRangeEligibleClubs(distance)
 if(eligible.length){
  return eligible.slice().sort((a,b)=>{
   const diffA=Math.abs(getAdjustedRangeCarry(a)-distance)
   const diffB=Math.abs(getAdjustedRangeCarry(b)-distance)
   if(diffA!==diffB) return diffA-diffB
   return (RANGE_CARRY_YARDAGES[a]||0)-(RANGE_CARRY_YARDAGES[b]||0)
  })[0]
 }

 return RANGE_CLUBS.slice().sort((a,b)=>{
  const diffA=Math.abs(getAdjustedRangeCarry(a)-distance)
  const diffB=Math.abs(getAdjustedRangeCarry(b)-distance)
  if(diffA!==diffB) return diffA-diffB
  return (RANGE_CARRY_YARDAGES[a]||0)-(RANGE_CARRY_YARDAGES[b]||0)
 })[0]
}
function getDisplayedRangeClubs(distance=currentDistance){
 const eligible=getRangeEligibleClubs(distance)
 return eligible.length ? eligible : [getRecommendedRangeClub(distance)]
}

 syncCurrentSelection()
}

}

}

const MISS_KEYS=["highToe","highHeel","lowToe","lowHeel"]
const LEGACY_MISS_KEY_MAP={longLeft:"highToe",longRight:"highHeel",shortLeft:"lowToe",shortRight:"lowHeel"}
const MISS_LABELS={highToe:"High Toe",highHeel:"High Heel",lowToe:"Low Toe",lowHeel:"Low Heel"}

function normalizeMissKey(key){
 if(MISS_KEYS.includes(key)) return key
 return LEGACY_MISS_KEY_MAP[key]||null
}

function createMissDir(){
 return {highToe:0,highHeel:0,lowToe:0,lowHeel:0}
}

function normalizeMissDir(missDir){
 const normalized=createMissDir()
 if(!missDir || typeof missDir!=="object") return normalized
 MISS_KEYS.forEach(key=>{normalized[key]=Number(missDir[key])||0})
 Object.keys(LEGACY_MISS_KEY_MAP).forEach(legacyKey=>{
  const mappedKey=LEGACY_MISS_KEY_MAP[legacyKey]
  normalized[mappedKey]+=Number(missDir[legacyKey])||0
 })
 return normalized
}

function getMissCount(missDir,key){
 const missKey=normalizeMissKey(key)
 return missKey ? (Number(missDir && missDir[missKey])||0) : 0
}

function accumulateMissDir(target,missDir){
 const normalized=normalizeMissDir(missDir)
 MISS_KEYS.forEach(key=>{target[key]+=normalized[key]})
 return target
}

function getMissCsvHeaders(){
 return MISS_KEYS.map(key=>MISS_LABELS[key])
}

function getMissCsvValues(missDir){
 const normalized=normalizeMissDir(missDir)
 return MISS_KEYS.map(key=>normalized[key])
}

function formatMissSummary(missDir){
 const normalized=normalizeMissDir(missDir)
 return "Misses - "+MISS_LABELS.highToe+": "+normalized.highToe+" | "+MISS_LABELS.highHeel+": "+normalized.highHeel+" | "+MISS_LABELS.lowToe+": "+normalized.lowToe+" | "+MISS_LABELS.lowHeel+": "+normalized.lowHeel
}

function createStatBucket(){
 return {made:0,missed:0,duffs:0,shanks:0,skulls:0,missDir:createMissDir()}
}

function createDistanceMap(factory){
 const map={}
 ALL_DISTANCES.forEach(d=>{map[d]=factory()})
 return map
}

function createClubDistanceMap(factory){
 const map={}
 ALL_CLUBS.forEach(club=>{map[club]=createDistanceMap(factory)})
 return map
}

function createModeMap(factory){
 const map={}
 TARGET_SET_MODES.forEach(mode=>{map[mode]=createClubDistanceMap(factory)})
 return map
}

function hasModeKeys(obj){
 return !!obj && TARGET_SET_MODES.some(mode=>obj[mode] && typeof obj[mode]==="object")
}

function hasClubKeys(obj){
 return !!obj && ALL_CLUBS.some(club=>obj[club] && typeof obj[club]==="object")
}

function migrateLegacyMap(obj,factory){
 const map=createModeMap(factory)
 if(!obj || typeof obj!=="object") return map

 if(hasModeKeys(obj)){
  TARGET_SET_MODES.forEach(mode=>{
   ALL_CLUBS.forEach(club=>{
    ALL_DISTANCES.forEach(d=>{
     if(obj[mode] && obj[mode][club] && obj[mode][club][d]!=null) map[mode][club][d]=obj[mode][club][d]
    })
   })
  })
  return map
 }

 if(hasClubKeys(obj)){
  ALL_CLUBS.forEach(club=>{
   ALL_DISTANCES.forEach(d=>{
    if(obj[club] && obj[club][d]!=null){
     const mode=inferLegacyTargetSetMode(club,d)
     map[mode][club][d]=obj[club][d]
    }
   })
  })
  return map
 }

 WEDGE_DISTANCES.forEach(d=>{
  if(obj[d]!=null) map.wedge[DEFAULT_CLUB][d]=obj[d]
 })
 return map
}

function ensureStatsShape(obj){
 const map=migrateLegacyMap(obj,createStatBucket)
 TARGET_SET_MODES.forEach(mode=>{
  ALL_CLUBS.forEach(club=>{
   ALL_DISTANCES.forEach(d=>{
    const bucket=map[mode][club][d]||{}
    map[mode][club][d]={
     made:Number(bucket.made)||0,
     missed:Number(bucket.missed)||0,
     duffs:Number(bucket.duffs)||0,
     shanks:Number(bucket.shanks)||0,
     skulls:Number(bucket.skulls)||0,
     missDir:normalizeMissDir(bucket.missDir)
    }
   })
  })
 })
 return map
}

function ensureCounterShape(obj){
 const map=migrateLegacyMap(obj,()=>0)
 TARGET_SET_MODES.forEach(mode=>{
  ALL_CLUBS.forEach(club=>{
   ALL_DISTANCES.forEach(d=>{
    map[mode][club][d]=Number(map[mode][club][d])||0
   })
  })
 })
 return map
}

function summarizeShotResults(history){
 let made=0
 let missed=0
 let duffs=0
 let shanks=0
 let skulls=0

 history.forEach(shot=>{
  if(shot.type==="made"){
   made++
   return
  }

  missed++
  if(shot.type==="duff") duffs++
  if(shot.type==="shank") shanks++
  if(shot.type==="skull") skulls++
 })

 return {
  made:made,
  missed:missed,
  duffs:duffs,
  shanks:shanks,
  skulls:skulls,
  total:made+missed
 }
}

function summarizeShotSequence(history){
 let streak=0
 let best=0

 history.forEach(shot=>{
  if(shot.type==="made"){
   streak++
   if(streak>best) best=streak
  }else{
   streak=0
  }
 })

 return {streak:streak,best:best}
}

 TARGET_SET_MODES.forEach(mode=>{
  ALL_CLUBS.forEach(club=>{
   ALL_DISTANCES.forEach(d=>{
    totalMade+=statsMap[mode][club][d].made||0
    totalMissed+=statsMap[mode][club][d].missed||0
   })
  })
 })
 const totalShots=totalMade+totalMissed
 return {
  made:totalMade,
  missed:totalMissed,
  total:totalShots,
  pct:totalShots?Math.round(totalMade/totalShots*100):0
 }
}

}

function recomputeHistoryFor(targetMode,club,distance){
 let streak=0
 let best=0

 shotHistory.forEach(shot=>{
  if(getShotTargetMode(shot)!==targetMode || shot.club!==club || shot.distance!==distance) return
  if(shot.type==="made"){
   streak++
   if(streak>best) best=streak
  }else{
   streak=0
  }
 })

 streaks[targetMode][club][distance]=streak
 bestStreaks[targetMode][club][distance]=best
}

function undoShot(){
 const activePracticeMode=getActivePracticeMode()
 let undoIndex=-1
 for(let i=shotHistory.length-1;i>=0;i--){
  const shot=shotHistory[i]
  if((shot.mode||"manual")===activePracticeMode && getShotTargetMode(shot)===targetSetMode){
   undoIndex=i
   break
  }
 }
 if(undoIndex===-1) return

 const last=shotHistory.splice(undoIndex,1)[0]
 const shotTargetMode=getShotTargetMode(last)
 const st=stats[shotTargetMode][last.club][last.distance]

 if(last.type==="made" && st.made>0){
  st.made--
  if(streaks[shotTargetMode][last.club][last.distance]>0) streaks[shotTargetMode][last.club][last.distance]--
 }

if(last.type==="missed" && st.missed>0){
  const missKey=normalizeMissKey(last.dir)
  st.missed--
  st.missDir=normalizeMissDir(st.missDir)
  if(missKey && st.missDir[missKey]>0) st.missDir[missKey]--
 }

 if(last.type==="duff" && st.missed>0){
  st.missed--
  if(st.duffs>0) st.duffs--
 }

 if(last.type==="shank" && st.missed>0){
  st.missed--
  if(st.shanks>0) st.shanks--
 }

 if(last.type==="skull" && st.missed>0){
  st.missed--
  if(st.skulls>0) st.skulls--
 }

 setTarget(last.club,last.distance)
 recomputeHistoryFor(shotTargetMode,last.club,last.distance)
 persistLiveState()
 updateStats()
 renderPracticeMode()
}

function renderHistory(){
 const h=$("history")
 h.innerHTML=""
 if(!sessions.length){
  h.innerHTML='<p style="opacity:.8">No sessions yet.</p>'
  return
 }

 sessions.slice().reverse().forEach((s,i)=>{
  const idx=sessions.length-1-i
  const wrap=document.createElement("div")
  wrap.className="history-wrapper"

  const card=document.createElement("div")
  card.className="history-card"

  const acc=document.createElement("div")
  acc.className="accordion"

  card.innerHTML="<strong>Session "+(idx+1)+"</strong><br>"+new Date(s.date).toLocaleDateString()+" - "+s.summary.pct+"% ("+s.summary.total+" shots)"
  card.onclick=()=>{acc.style.display=acc.style.display==="block"?"none":"block"}

  ALL_CLUBS.forEach(club=>{
   ALL_DISTANCES.forEach(d=>{
    const st=s.stats && s.stats[club] && s.stats[club][d]
    if(!st) return

    const tot=(st.made||0)+(st.missed||0)
    if(!tot) return

    const rowMode=inferTargetSetMode(club,d)
    const missDir=st.missDir||createMissDir()
    const pct=Math.round(st.made/tot*100)
    const upAndDown=getUpAndDownValue(d,rowMode)
    const targetFeet=getTargetFeet(d,rowMode)
    const earnedMark=rowMode==="wedge" && pct>upAndDown ? " ⭐" : ""
    const windSummary=rowMode==="range" ? getRangeWindSummary(s.shots,club,d) : ""

    const row=document.createElement("div")
    row.innerHTML="<strong>"+formatClubLabel(club)+" - "+d+" yd:</strong> "+st.made+"/"+tot+" ("+pct+"%)"+(rowMode==="wedge" ? " - "+targetFeet+"ft"+earnedMark : " - Range Mode")+
     (rowMode==="wedge"
      ? '<br><span class="subtle">Up and Down: '+formatPercent(upAndDown)+'%</span>'
      : '<br><span class="subtle">Wind: '+(windSummary||"Not recorded")+'</span>')+
     '<br><span class="subtle">'+formatMissSummary(missDir)+'</span>'+
     '<br><span class="subtle">Duffs: '+(st.duffs||0)+' | Shanks: '+(st.shanks||0)+' | Skulls: '+(st.skulls||0)+' | Best streak: '+((s.bestStreaks && s.bestStreaks[club] && s.bestStreaks[club][d])||0)+'</span>'
    acc.appendChild(row)
   })
  })

  const delBtn=document.createElement("button")
  delBtn.textContent="🗑️ Delete Session"
  delBtn.onclick=e=>{e.stopPropagation();deleteSession(idx)}
  delBtn.style="display:block;width:100%;margin-top:10px;background:#E34234;color:#000;padding:6px 10px;font-size:20px;font-weight:800;border:none;border-radius:12px;cursor:pointer;"

  acc.appendChild(delBtn)
  wrap.appendChild(card)
  wrap.appendChild(acc)
  h.appendChild(wrap)
 })
}

  accumulateMissDir(grandMiss,sessionMiss)
 })

 const gShots=grandMade+grandMissed
 const gPct=gShots?Math.round(grandMade/gShots*100):0
 const grandDuffs=sessions.reduce((total,s)=>{
  return total+TARGET_SET_MODES.reduce((modeTotal,targetMode)=>{
   return modeTotal+ALL_CLUBS.reduce((clubTotal,club)=>{
    return clubTotal+ALL_DISTANCES.reduce((sum,d)=>{
     const bucket=((((s.stats||{})[targetMode]||{})[club]||{})[d]||{})
     return sum+(bucket.duffs||0)
    },0)
   },0)
  },0)
 },0)
 const grandShanks=sessions.reduce((total,s)=>{
  return total+TARGET_SET_MODES.reduce((modeTotal,targetMode)=>{
   return modeTotal+ALL_CLUBS.reduce((clubTotal,club)=>{
    return clubTotal+ALL_DISTANCES.reduce((sum,d)=>{
     const bucket=((((s.stats||{})[targetMode]||{})[club]||{})[d]||{})
     return sum+(bucket.shanks||0)
    },0)
   },0)
  },0)
 },0)
 const grandSkulls=sessions.reduce((total,s)=>{
  return total+TARGET_SET_MODES.reduce((modeTotal,targetMode)=>{
   return modeTotal+ALL_CLUBS.reduce((clubTotal,club)=>{
    return clubTotal+ALL_DISTANCES.reduce((sum,d)=>{
     const bucket=((((s.stats||{})[targetMode]||{})[club]||{})[d]||{})
     return sum+(bucket.skulls||0)
    },0)
   },0)
  },0)
 },0)
 const gMissTotal=grandMissed
 const gHighToePct=gMissTotal?Math.round(grandMiss.highToe/gMissTotal*100):0
 const gHighHeelPct=gMissTotal?Math.round(grandMiss.highHeel/gMissTotal*100):0
 const gLowToePct=gMissTotal?Math.round(grandMiss.lowToe/gMissTotal*100):0
 const gLowHeelPct=gMissTotal?Math.round(grandMiss.lowHeel/gMissTotal*100):0
 const gDuffPct=gMissTotal?Math.round(grandDuffs/gMissTotal*100):0
 const gShankPct=gMissTotal?Math.round(grandShanks/gMissTotal*100):0
 const gSkullPct=gMissTotal?Math.round(grandSkulls/gMissTotal*100):0
 const grandMisHits=grandDuffs+grandShanks+grandSkulls
 const grandMisHitPct=gMissTotal?Math.round(grandMisHits/gMissTotal*100):0
 const grandHasRange=sessions.some(s=>hasRangeLabel(getSessionRangeModeLabel(s.stats)))
 const grandHasWedge=sessions.some(s=>hasWedgeLabel(getSessionRangeModeLabel(s.stats)))
 const grandModeLabel=getModeLabel(grandHasRange,grandHasWedge)

 csv+="GRAND TOTAL,,ALL,ALL,"+grandModeLabel+",,,,"+grandMade+","+grandMissed+","+gPct+"%,,"+
      fmt(grandMiss.highToe,gHighToePct)+","+
      fmt(grandMiss.highHeel,gHighHeelPct)+","+
      fmt(grandMiss.lowToe,gLowToePct)+","+
      fmt(grandMiss.lowHeel,gLowHeelPct)+","+fmt(grandDuffs,gDuffPct)+","+fmt(grandShanks,gShankPct)+","+fmt(grandSkulls,gSkullPct)+","+fmt(grandMisHits,grandMisHitPct)+",\n"

 const blob=new Blob([csv],{type:"text/csv"})
 const url=URL.createObjectURL(blob)
 const a=document.createElement("a")
 a.href=url
 a.download="forestrike-history.csv"
 a.click()
 URL.revokeObjectURL(url)
}

function renderHistory(){
 const h=$("history")
 h.innerHTML=""
 if(!sessions.length){
  h.innerHTML='<p style="opacity:.8">No sessions yet.</p>'
  return
 }

 sessions.slice().reverse().forEach((s,i)=>{
  const idx=sessions.length-1-i
  const wrap=document.createElement("div")
  wrap.className="history-wrapper"

  const card=document.createElement("div")
  card.className="history-card"

  const acc=document.createElement("div")
  acc.className="accordion"

  card.innerHTML="<strong>Session "+(idx+1)+"</strong><br>"+new Date(s.date).toLocaleDateString()+" - "+s.summary.pct+"% ("+s.summary.total+" shots)"
  card.onclick=()=>{acc.style.display=acc.style.display==="block"?"none":"block"}

  ALL_CLUBS.forEach(club=>{
   TARGET_SET_MODES.forEach(targetMode=>{
    ALL_DISTANCES.forEach(d=>{
     const st=s.stats && s.stats[targetMode] && s.stats[targetMode][club] && s.stats[targetMode][club][d]
     if(!st) return

     const tot=(st.made||0)+(st.missed||0)
     if(!tot) return

     const missDir=st.missDir||createMissDir()
     const pct=Math.round(st.made/tot*100)
     const upAndDown=getUpAndDownValue(d,targetMode)
     const targetFeet=getTargetFeet(d,targetMode)
     const earnedMark=targetMode==="wedge" && pct>upAndDown ? " ⭐" : ""
     const windSummary=targetMode==="range" ? getRangeWindSummary(s.shots,club,d) : ""
     const tempSummary=targetMode==="range" ? getRangeTempSummary(s.shots,club,d) : ""
     const bestStreak=((s.bestStreaks && s.bestStreaks[targetMode] && s.bestStreaks[targetMode][club] && s.bestStreaks[targetMode][club][d])||0)

     const row=document.createElement("div")
     row.innerHTML="<strong>"+formatClubLabel(club)+" - "+d+" yd ("+(targetMode==="range" ? "Range" : "Wedge")+"):</strong> "+st.made+"/"+tot+" ("+pct+"%)"+(targetMode==="wedge" ? " - "+targetFeet+"ft"+earnedMark : " - Range Mode")+
      (targetMode==="wedge"
       ? '<br><span class="subtle">Up and Down: '+formatPercent(upAndDown)+'%</span>'
       : '<br><span class="subtle">Wind: '+(windSummary||"Not recorded")+', Temp: '+(tempSummary||"Not recorded")+'</span>')+
     '<br><span class="subtle">'+formatMissSummary(missDir)+'</span>'+
     '<br><span class="subtle">Duffs: '+(st.duffs||0)+' | Shanks: '+(st.shanks||0)+' | Skulls: '+(st.skulls||0)+' | Best streak: '+bestStreak+'</span>'
     acc.appendChild(row)
    })
   })
  })

  const delBtn=document.createElement("button")
  delBtn.textContent="🗑️ Delete Session"
  delBtn.onclick=e=>{e.stopPropagation();deleteSession(idx)}
  delBtn.style="display:block;width:100%;margin-top:10px;background:#E34234;color:#000;padding:6px 10px;font-size:20px;font-weight:800;border:none;border-radius:12px;cursor:pointer;"

  acc.appendChild(delBtn)
  wrap.appendChild(card)
  wrap.appendChild(acc)
  h.appendChild(wrap)
 })
}

function initApp(){
 stats=loadStats()
 streaks=loadStreaks()
 bestStreaks=loadBestStreaks()
 sessions=loadSessions()
 shotHistory=loadShotHistory()
 const selectionState=loadSelectionState()
 modeSelections={wedge:selectionState.wedge}
 rangeSelections=selectionState.range
 practiceMode=loadPracticeMode()
 targetSetMode=loadTargetSetMode()
 rangeWindSpeed=loadRangeWindSpeed()
 rangeTemperature=loadRangeTemperature()
 persistLiveState()
 if(targetSetMode==="range"){
  if(practiceMode==="manual"){
   currentClub=RANGE_CLUBS.includes(rangeSelections.manual.club) ? rangeSelections.manual.club : MODE_CONFIG.range.defaultClub
   currentDistance=getManualRangeTargetDistance(currentClub)
   rangeSelections.manual={club:currentClub,distance:currentDistance}
  }else{
   currentClub=RANGE_CLUBS.includes(rangeSelections.random.club) ? rangeSelections.random.club : MODE_CONFIG.range.defaultClub
   currentDistance=getSelectableDistances("range").includes(rangeSelections.random.distance) ? rangeSelections.random.distance : MODE_CONFIG.range.defaultDistance
   rangeSelections.random={club:currentClub,distance:currentDistance}
  }
 }else{
  currentClub=modeSelections.wedge.club
  currentDistance=modeSelections.wedge.distance
 }
 if(practiceMode==="random"){
  pickRandomTarget()
 }else{
  syncCurrentSelection()
 }
 renderHistory()
 renderPracticeMode()
}

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",initApp)}else{initApp()}
</script>
